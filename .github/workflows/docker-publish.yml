name: Build & Push Docker Image

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kittors/clirelay

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: build_meta
        run: |
          set -euo pipefail
          REF_NAME="${GITHUB_REF_NAME:-main}"
          BACKEND_SHORT="$(git rev-parse --short HEAD)"
          FRONTEND_REF="${REF_NAME}"
          FRONTEND_COMMIT="$(git ls-remote https://github.com/kittors/codeProxy.git "refs/heads/${FRONTEND_REF}" | awk '{print $1}')"
          if [ -z "${FRONTEND_COMMIT}" ]; then
            echo "Unable to resolve frontend ref: ${FRONTEND_REF}" >&2
            exit 1
          fi
          FRONTEND_SHORT="${FRONTEND_COMMIT:0:7}"
          echo "VERSION=${REF_NAME}-${BACKEND_SHORT}" >> "$GITHUB_ENV"
          echo "UI_VERSION=panel-${FRONTEND_REF}-${FRONTEND_SHORT}" >> "$GITHUB_ENV"
          echo "FRONTEND_REF=${FRONTEND_REF}" >> "$GITHUB_ENV"
          echo "FRONTEND_COMMIT=${FRONTEND_COMMIT}" >> "$GITHUB_ENV"
          echo "backend_short=${BACKEND_SHORT}" >> "$GITHUB_OUTPUT"
          echo "frontend_short=${FRONTEND_SHORT}" >> "$GITHUB_OUTPUT"
          echo "frontend_commit=${FRONTEND_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=main,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=raw,value=${{ github.ref_name }}-${{ steps.build_meta.outputs.backend_short }}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Get build date
        id: build_date
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.date }}
            UI_VERSION=${{ env.UI_VERSION }}
            FRONTEND_REF=${{ env.FRONTEND_REF }}
            FRONTEND_COMMIT=${{ env.FRONTEND_COMMIT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
