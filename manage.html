<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLI Proxy API Management Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- 阻塞渲染的主题恢复脚本：在 body 绘制前读取 localStorage 并应用暗色模式 -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("code-proxy-admin-theme");
          if (t === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          } else if (t === "light") {
            document.documentElement.classList.remove("dark");
            document.documentElement.style.colorScheme = "light";
          } else {
            // 跟随系统偏好
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
              document.documentElement.classList.add("dark");
              document.documentElement.style.colorScheme = "dark";
            }
          }
        } catch (e) {}
      })();
    </script>
    <style>
      /* ── 首屏 loading 样式 ── */
      :root {
        --loading-bg: #f4f4f5;
        --loading-text: #64748b;
        --loading-ring: rgba(99, 102, 241, 0.55);
        --loading-ring-track: rgba(99, 102, 241, 0.12);
        --loading-glow-1: rgba(59, 130, 246, 0.1);
        --loading-glow-2: rgba(20, 184, 166, 0.08);
        --loading-glow-3: rgba(168, 85, 247, 0.07);
      }
      .dark {
        --loading-bg: #0a0a0a;
        --loading-text: rgba(255, 255, 255, 0.5);
        --loading-ring: rgba(129, 140, 248, 0.65);
        --loading-ring-track: rgba(129, 140, 248, 0.12);
        --loading-glow-1: rgba(99, 102, 241, 0.16);
        --loading-glow-2: rgba(45, 212, 191, 0.1);
        --loading-glow-3: rgba(168, 85, 247, 0.1);
      }

      body {
        margin: 0;
        background-color: var(--loading-bg);
        transition: background-color 0.3s ease;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background-color: var(--loading-bg);
        opacity: 1;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
        font-family: "Inter", "SF Pro Text", system-ui, sans-serif;
      }
      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* 背景光晕 */
      .loader-glow {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        animation: glow-pulse 4s ease-in-out infinite alternate;
      }
      .loader-glow-1 {
        width: 28rem;
        height: 28rem;
        top: -8rem;
        left: -6rem;
        background: var(--loading-glow-1);
      }
      .loader-glow-2 {
        width: 24rem;
        height: 24rem;
        top: -4rem;
        right: -6rem;
        background: var(--loading-glow-2);
        animation-delay: 1.3s;
      }
      .loader-glow-3 {
        width: 28rem;
        height: 28rem;
        bottom: -8rem;
        left: 25%;
        background: var(--loading-glow-3);
        animation-delay: 2.6s;
      }

      /* 旋转光环 */
      .loader-ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid var(--loading-ring-track);
        border-top-color: var(--loading-ring);
        animation: ring-spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        margin-bottom: 20px;
      }

      /* 品牌文字 */
      .loader-text {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: var(--loading-text);
        animation: text-breathe 2.4s ease-in-out infinite;
        user-select: none;
      }

      /* 容器淡入 */
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: content-fade-in 0.6s ease-out;
      }

      @keyframes ring-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes text-breathe {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }
      @keyframes glow-pulse {
        0% {
          opacity: 0.5;
          transform: scale(0.95);
        }
        100% {
          opacity: 1;
          transform: scale(1.05);
        }
      }
      @keyframes content-fade-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

  <body>
    <!-- 首屏 loading 占位——React 挂载后自动淡出移除 -->

      <div class="loader-glow loader-glow-1"></div>
      <div class="loader-glow loader-glow-2"></div>
      <div class="loader-glow loader-glow-3"></div>
