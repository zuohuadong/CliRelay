name: pr-test-build

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
      - name: Gofmt check
        run: |
          set -euo pipefail
          files="$(gofmt -l . || true)"
          if [ -n "${files}" ]; then
            echo "gofmt needed for:"
            echo "${files}"
            exit 1
          fi
      - name: Secret smoke scan (prevent committing real-looking API keys)
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import sys
          
          # Heuristic only: we allow obvious placeholders (contains 'X' or '*') and
          # fail on real-looking OpenAI-style keys accidentally checked in.
          key_re = re.compile(r"\\bsk-[A-Za-z0-9]{16,}\\b")
          
          skip_dirs = {".git", ".gocache", ".tmp-go", ".agentflow"}
          skip_ext = {".png", ".jpg", ".jpeg", ".gif", ".ico", ".svg", ".pdf", ".zip"}
          
          bad = []
          for root, dirs, files in os.walk("."):
            dirs[:] = [d for d in dirs if d not in skip_dirs]
            for fn in files:
              _, ext = os.path.splitext(fn)
              if ext.lower() in skip_ext:
                continue
              path = os.path.join(root, fn)
              try:
                with open(path, "rb") as f:
                  data = f.read()
              except OSError:
                continue
          
              # Skip large/binary files quickly.
              if b"\\x00" in data:
                continue
              try:
                text = data.decode("utf-8", errors="ignore")
              except Exception:
                continue
          
              for m in key_re.finditer(text):
                key = m.group(0)
                if ("X" in key) or ("*" in key):
                  continue
                bad.append((path, key))
          
          if bad:
            print("Found real-looking API key(s). Use placeholders like 'sk-...XXXX...' or masked forms.")
            for path, key in bad[:50]:
              print(f"  {path}: {key}")
            sys.exit(1)
          PY
      - name: Vet
        run: |
          go vet ./...
      - name: Test
        run: |
          go test ./...
      - name: Golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          "$(go env GOPATH)/bin/golangci-lint" run --config .golangci.yml
      - name: Build
        run: |
          go build -o test-output ./cmd/server
          rm -f test-output
